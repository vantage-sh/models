name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - run: npm run init

      - name: Check formatting with Prettier
        run: npx prettier --check "src/**/*.{ts,tsx}" "scraper/**/*.ts"

      - name: Type check
        run: npx tsc --noEmit
